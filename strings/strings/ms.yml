# Help Menus

cmda: "✘ Perintah Tersedia"
help_admintools: "-\n\n• `.promote <balas pengguna/userid/username>`\n• `.demote`\n    Naikkan/Turunkan pangkat pengguna dalam chat.\n\n• `.ban <balas pengguna/userid/username> <sebab>`\n• `.unban`\n    Larang/Buka larangan pengguna daripada chat.\n\n• `.kick <balas pengguna/userid/username> <sebab>`\n    Keluarkan pengguna daripada chat.\n\n• `.pin <balas mesej>`\n    Semat mesej dalam chat\n• `.tpin <masa> <mesej semat sementara>`\n• `.unpin (all) <balas mesej>`\n    Nyahsemat mesej dalam chat.\n\n• `.pinned`\n   Dapatkan mesej tersematkan dalam chat semasa.\n• `.listpinned`\n   Dapatkan semua mesej tersematkan dalam chat semasa\n\n• `.autodelete <24h/7d/1m/off>`\n   Aktifkan Auto Padam Mesej dalam Chat.\n\n• `.purge <balas mesej>`\n    Buang semua mesej dari mesej yang dibalas.\n\n• `.purgeme <balas mesej>`\n    Buang mesej anda sahaja dari mesej yang dibalas.\n\n• `.purgeall`\n    Padam semua mesej pengguna yang dibalas.\n"
help_afk: " -\n\n• `{i}afk <sebab pilihan>`\n    AFK bermaksud away from keyboard,\n    Selepas ini diaktifkan, jika seseorang tag atau mesej anda, dia akan mendapat balasan automatik daripada bot.\n\n    (Nota : Tetapkan fail media dalam mesej afk dengan membalas mana-mana media dengan `{i}afk <sebab>`).\n\n"
help_antiflood: " -\n\n• `{i}setflood <integer>`\n    Tetapkan had flood dalam chat.\n\n• `{i}remflood`\n    Buang had flood daripada chat.\n\n• `{i}getflood`\n    Dapatkan had flood sesuatu chat.\n"
help_asstcmd: " -\n\n•`{i}addcmd <arahan baru> <balas>`\n   Ia akan menetapkan arahan baru untuk bot pembantu anda dengan mesej balas tersebut.\n\n•`{i}remcmd <nama arahan>`\n   Ia akan membuang arahan anda.\n\n•`{i}listcmd`\n   Untuk mendapatkan senarai semua arahan tersuai anda.\n"
help_audiotools: "✘ Perintah Tersedia - \n`.makevoice <balas kepada audio>`\n   mencipta nota suara daripada Audio.\n\n`.atrim <dari masa> - <ke masa>`\n   trim audio mengikut masa yang diberikan.\n   masa mestilah dalam saat. `.atrim 50-70`\n\n`.extractaudio <balas kepada media>`\n   Untuk mengekstrak audio daripadanya.\n\n"
help_autoban: "\n\n• `{i}autokick <on/off>`\n    on - Untuk mengaktifkan.\n    off - Untuk menyahaktifkan.\n    Secara automatik mengeluarkan pengguna baru yang menyertai kumpulan.\n\n• `{i}cban`\n    Aktifkan/Nyahaktifkan autoban hantar sebagai saluran dalam chat yang digunakan.\n\n• `{i}addwl <Username>`\n   Tambah Saluran ke senarai putih channelban.\n\n• `{i}remwl <Username>`\n   Buang Saluran daripada senarai putih channelban.\n\n• `{i}listwl` : Senaraikan semua saluran senarai putih.\n"
help_beautify: " -\n\n• `{i}carbon <teks/balas mesej/balas dokumen>`\n    Karbonkan teks dengan tetapan lalai.\n\n• `{i}rcarbon <teks/balas mesej/balas dokumen>`\n    Karbonkan teks, dengan warna latar rawak.\n\n• `{i}ccarbon <warna><teks/balas mesej/balas dokumen>`\n    Karbonkan teks, dengan warna latar tersuai.\n\n• `{i}rayso <tema-pilihan> <teks>/<balas mesej>`\n  `{i}rayso list` - `Dapatkan senarai tema.`\n"
help_blacklist: " -\n\n• `{i}blacklist <perkataan/semua perkataan dengan ruang>`\n    Senarai hitamkan perkataan yang dipilih dalam chat itu.\n\n• `{i}remblacklist <perkataan>`\n    Buang perkataan daripada senarai hitam..\n\n• `{i}listblacklist`\n    Senaraikan semua perkataan senarai hitam.\n\n  'jika seseorang menggunakan Perkataan senarai hitam, mesej nya akan dipadam'\n  'Dan anda Mestilah Admin dalam Chat itu'\n"
help_bot: "\n\n• `{i}alive` | `{i}alive inline`\n    Semak sama ada bot anda berfungsi.\n\n• `{i}ping`\n    Semak masa tindak balas Ultroid.\n\n• `{i}update`\n    Lihat changelog jika ada kemas kini tersedia.\n\n• `{i}cmds`\n    Lihat semua nama plugin.\n\n• `{i}restart`\n    Untuk restart bot anda.\n\n• `{i}logs (sys)`\n    Dapatkan log terminal penuh.\n• `{i}logs carbon`\n    Dapatkan log sys yang dikarbonkan.\n• `{i}logs heroku`\n   Dapatkan 100 baris terkini log heroku.\n\n• `{i}shutdown`\n    Matikan bot anda.\n"
help_broadcast: "\n\n• `{i}addch <id/balas ke senarai/tiada>`\n    Tambah chat ke database. Tambah chat semasa jika tiada id diberikan.\n\n• `{i}remch <all/id/tiada>`\n    Buang chat yang ditetapkan (chat semasa jika tiada ditetapkan), atau semua chat.\n\n• `{i}broadcast <balas mesej>`\n    Hantar mesej yang dibalas ke semua chat dalam database.\n\n• `{i}forward <balas mesej>`\n     Majukan mesej ke semua chat dalam database.\n\n• `{i}listchannels`\n    Untuk mendapatkan senarai semua chat yang ditambah.\n"
help_button: " -\n\n• `{i}button <teks dengan format butang`\n   buat butang anda boleh balas kepada gambar juga\n\nFormat:- `{i}button Hey There! @UseUltroid 😎.\n[Ultroid | t.me/theUltroid][Support | t.me/UltroidSupportChat | same]\n[TeamUltroid | t.me/TeamUltroid]`\n"
help_calculator: " -\n\n•`{i}calc` - Kalkulator Inline\n\n"
help_channelhacks: "\n\n🔹 `{i}shift <dari saluran> | <ke saluran>`\n     Ini akan memindahkan semua siaran lama dari saluran A ke saluran B.\n      (anda boleh menggunakan username atau id saluran juga)\n      contoh : `{i}shift @abc | @xyz`\n      [nota - tanda (' | ') ini adalah wajib]\n\n🔹 Untuk auto-posting/memajukan semua mesej baru dari mana-mana saluran sumber ke mana-mana saluran destinasi.\n\n   `{i}asource <username atau id saluran>`\n      Ini menambah saluran sumber ke database\n   `{i}dsource <username atau id saluran>`\n      Ini membuang saluran sumber daripada database\n   `{i}listsource <username atau id saluran>`\n      Tunjukkan senarai saluran sumber\n\n\n   `{i}adest <username atau id saluran>`\n      Ini menambah saluran anda ke database\n   `{i}ddest <username atau id saluran>`\n      Ini Membuang saluran anda daripada database\n   `{i}listdest <username atau id saluran>`\n      Tunjukkan Senarai saluran anda\n\n   'anda boleh menetapkan banyak saluran dalam database'\n   'Untuk mengaktifkan auto-post guna `{i}setdb AUTOPOST True` '\n"
help_chatbot: " -\n\n• `{i}addai <balas pengguna/beri username/userid>`\n   Tambah AI ChatBot untuk membalas pengguna tersebut.\n\n• `{i}remai <balas pengguna/beri username/userid>`\n   Buang AI ChatBot.\n\n• `{i}repai <balas pengguna/beri mesej>`\n   Balas kepada pengguna dengan mesej oleh AI.\n\n• `{i}listai`\n   Senaraikan pengguna yang sedang dikuasai AI.\n"
help_chats: " -\n\n• `{i}delchat <pilihan- username/id>`\n    Padam kumpulan yang arahan ini digunakan.\n\n• `{i}getlink`\n• `{i}getlink r` - `buat pautan dengan kelulusan admin`\n• `{i}getlink r tajuk_di_sini` - `kelulusan admin dengan tajuk pautan`\n• `{i}getlink 10` - `had penggunaan dalam pautan baru`\n    Dapatkan pautan kumpulan yang arahan ini digunakan.\n\n• `{i}create (g|b|c) <nama_kumpulan> ; <username-pilihan>`\n    Buat kumpulan dengan nama tertentu.\n    g - megagroup/supergroup\n    b - kumpulan kecil\n    c - saluran\n\n• `{i}setgpic <balas ke Foto><username chat>`\n    Tetapkan gambar profil Kumpulan.\n\n• `{i}delgpic <username chat -pilihan>`\n    Padam gambar profil Kumpulan.\n\n• `{i}unbanall`\n    Buka larangan semua Ahli sesebuah kumpulan.\n\n• `{i}rmusers`\n    Buang pengguna secara khusus.\n"
help_cleanaction: " -\n\n•`{i}addclean`\n    Bersihkan semua mesej tindakan akan datang dalam chat yang ditambah seperti seseorang menyertai/keluar/semat dsb.\n\n•`{i}remclean`\n    Buang chat daripada database.\n\n•`{i}listclean`\n   Untuk mendapatkan senarai semua chat yang diaktifkan.\n\n"
help_converter: " -\n\n• `{i}convert <gif/img/sticker/webm>`\n    Balas kepada media untuk menukarnya kepada gif / imej / webm / pelekat biasa.\n\n• `{i}doc <namaFail.sambungan>`\n    Balas kepada mesej teks untuk menyimpannya dalam fail.\n\n• `{i}open`\n    Balas kepada fail untuk mendedahkan teksnya.\n\n• `{i}rename <nama fail dengan sambungan>`\n    Namakan semula fail\n\n• `{i}thumbnail <balas ke imej/fail thumbnail>`\n    Muat naik fail anda dengan thumbnail tersuai anda.\n"
help_core: " -\n\n• `{i}install <balas ke plugin>`\n    Untuk memasang plugin,\n  `{i}install f`\n    Untuk pasang paksa.\n\n• `{i}uninstall <nama plugin>`\n    Untuk nyahmuatkan dan membuang plugin.\n\n• `{i}load <nama plugin>`\n    Untuk memuatkan plugin tidak rasmi yang dinyahmuatkan.\n\n• `{i}unload <nama plugin>`\n    Untuk nyahmuatkan plugin tidak rasmi.\n\n• `{i}help <nama plugin>`\n    Menunjukkan menu bantuan (seperti ini) untuk setiap plugin.\n\n• `{i}getaddons <pautan raw ke kod>`\n    Muatkan Plugin daripada pautan raw yang diberikan.\n"
help_database: " -\n\n• **Arahan DataBase, jangan guna jika anda tidak tahu apa itu.**\n\n• `{i}setdb kunci | nilai`\n    Tetapkan Nilai dalam Database.\n    cth :\n    `{i}setdb hi there`\n    `{i}setdb hi there | ultroid here`\n    `{i}setdb --extend pembolehubah nilai` atau `{i}setdb -e pembolehubah nilai` untuk menambah nilai ke nilai sedia ada dalam db.\n\n• `{i}deldb kunci`\n    Padam Kunci daripada DB.\n\n• `{i}rendb nama kunci lama | nama kunci baru`\n    Kemas Kini Nama Kunci\n"
help_devtools: " -\n\n• `{i}bash <arahan>`\n• `{i}bash -c <arahan>` Imej Carbon sebagai output arahan.\n    Jalankan arahan linux pada telegram.\n\n• `{i}eval <kod>`\n    Nilaikan arahan python pada telegram.\n    Pintasan:\n        client = bot = event.client\n        e = event\n        p = print\n        reply = await event.get_reply_message()\n        chat = event.chat_id\n\n• `{i}cpp <kod>`\n    Jalankan kod c++ dari Telegram.\n\n• `{i}sysinfo`\n    Tunjukkan Maklumat Sistem.\n"
help_downloadupload: " -\n\n• `{i}ul <laluan/ke/fail>`\n    Muat naik fail di telegram.\n    Guna argumen berikut sebelum atau selepas nama fail mengikut keperluan:\n      `--stream` untuk muat naik sebagai strim.\n      `--delete` untuk memadam fail selepas muat naik.\n      `--no-thumb` untuk muat naik tanpa thumbnail.\n\n• `{i}dl <namaFail(pilihan)>`\n    Balas kepada fail untuk dimuat turun.\n\n• `{i}download <DDL> (| namaFail)`\n    Muat turun menggunakan DDL. Nama fail akan dijana secara automatik jika tidak diberikan.\n"
help_echo: "\n\n•`{i}addecho <balas kepada sesiapa>`\n   Mulakan Auto Echo mesej pengguna yang dibalas.\n\n•`{i}remecho <balas kepada sesiapa>`\n   Matikannya\n\n•`{i}listecho <balas kepada sesiapa>`\n   Untuk Mendapatkan senarai.\n"
help_extra: " -\n\n• `{i}del <balas mesej>`\n    Padam mesej yang dibalas.\n\n• `{i}edit <mesej baru>`\n    Edit mesej terakhir anda atau mesej yang dibalas.\n\n• `{i}copy <balas mesej>`\n    Salin mesej / media yang dibalas.\n\n• `{i}reply`\n    Balas mesej terakhir yang dihantar kepada pengguna yang dibalas.\n"
help_fakeaction: " -\n\n• `{i}ftyping <masa/dalam saat>`\n    `Tunjukkan Taip Palsu dalam chat semasa.`\n\n• `{i}faudio <masa/dalam saat>`\n    `Tunjukkan Tindakan Rakaman Palsu dalam chat semasa.`\n\n• `{i}fvideo <masa/dalam saat>`\n    `Tunjukkan tindakan video palsu dalam chat semasa.`\n\n• `{i}fgame <masa/dalam saat>`\n    `Tunjukkan Tindakan Main Permainan Palsu dalam chat semasa.`\n\n• `{i}fsticker <masa/dalam saat>`\n    `Tunjukkan Tindakan Pilih Pelekat Palsu dalam chat semasa.`\n\n• `{i}flocation <masa/dalam saat>`\n    `Tunjukkan Tindakan lokasi Palsu dalam chat semasa.`\n\n• `{i}fcontact <masa/dalam saat>`\n    `Tunjukkan Tindakan Pilih Kenalan Palsu dalam chat semasa.`\n\n• `{i}fround <masa/dalam saat>`\n    `Tunjukkan tindakan mesej video palsu dalam chat semasa.`\n\n• `{i}fphoto <masa/dalam saat>`\n    `Tunjukkan Hantar foto palsu dalam chat semasa.`\n\n• `{i}fdocument <masa/dalam saat>`\n    `Tunjukkan Hantar dokumen palsu dalam chat semasa.`\n"
help_fedutils: " -\n\n• `{i}superfban <balas pengguna/userid/username>`\n    FBan orang tersebut di semua fed yang anda adalah admin.\n\n• `{i}superunfban <balas pengguna/userid/username>`\n    Buka FBan orang tersebut di semua fed yang anda adalah admin.\n\nTetapkan Kumpulan FBan dan Fed untuk dikecualikan dalam pembantu.\n\n• `{i}fstat <username/id/balas pengguna>`\n    Kumpul stat fed orang tersebut dalam Rose.\n\n• `{i}fedinfo <(fedid)>`\n    Kumpul maklumat persekutuan bagi id fed yang diberikan, atau fed yang anda miliki, daripada Rose.\n"
help_fileshare: " -\n\n• `{i}store <balas_mesej>`\n   Simpan mesej/media yang dibalas dan jana pautan boleh dikongsi ke fail tersebut, untuk diakses melalui bot pembantu anda!\n\n• `{i}delstored <pautan fail tersimpan>`\n    Padam fail tersimpan.\n\n• `{i}liststored`\n   Dapatkan semua mesej tersimpan.\n\n• Guna Inline dengan bot pembantu anda dengan `filestore` untuk melihat fail tersimpan secara inline.\n"
help_filter: " -\n\n• `{i}addfilter <perkataan><balas mesej>`\n    tambah perkataan yang digunakan sebagai penapis berkaitan dengan mesej yang dibalas.\n\n• `{i}remfilter <perkataan>`\n    Buang pengguna yang ditapis..\n\n• `{i}listfilter`\n    senaraikan semua penapis.\n"
help_fontgen: "\n• `{i}font <nama fon> : <teks>`\n    Jana fon berbeza untuk teks tersebut.\n\n• `{i}font`\n    Untuk mendapatkan senarai fon\n"
help_giftools: "\n\n•`{i}invertgif`\n  Jadikan Gif Terbalik(negatif).\n\n•`{i}bwgif`\n  Jadikan Gif hitam putih\n\n•`{i}rvgif`\n  Balikkan sebuah gif\n\n•`{i}vtog`\n  Balas kepada Video, ia akan Mencipta Gif\n  Video ke Gif\n\n•`{i}gif <pertanyaan>`\n   Hantar video berkaitan pertanyaan.\n"
help_globaltools: " -\n\n• `{i}gban <balas pengguna/ username>`\n• `{i}ungban`\n    Larang/Buka Larangan Secara Global.\n\n• `{i}gstat <balas pengguna/userid/username>`\n   Semak sama ada pengguna GBanned.\n\n• `{i}listgban` : Senaraikan semua pengguna GBanned.\n\n• `{i}gmute` | `{i}ungmute` <balas pengguna/ username>\n    Senyap/Nyahsenyap Secara Global.\n\n• `{i}gkick <balas/username>` `Keluarkan Pengguna Secara Global`\n• `{i}gcast <teks/balas>` `Hantar mesej secara global di semua kumpulan`\n\n• `{i}gadmincast <teks/balas>` `Siar secara global dalam chat admin anda`\n• `{i}gucast <teks/balas>` `Hantar mesej secara global ke semua pengguna pm`\n\n• `{i}gblacklist <id chat/username/tiada (untuk chat semasa)`\n   Tambah chat ke senarai hitam dan abaikan siaran global.\n• `{i}ungblacklist` `Buang chat daripada senarai hitam.`\n\n• `{i}gpromote <balas pengguna> <saluran/kumpulan/semua> <pangkat>`\n    naikkan pangkat pengguna secara global di mana anda adalah admin\n    - Tetapkan sama ada untuk naikkan pangkat hanya dalam kumpulan/saluran/semua.\n    Cth- `gpromote group boss` ~ naikkan pangkat pengguna dalam semua kumpulan.\n        `gpromote @username all sar` ~ naikkan pangkat pengguna dalam semua kumpulan & saluran\n• `{i}gdemote` - `turunkan pangkat pengguna secara global`\n"
help_greetings: " -\n\n---- Selamat Datang ----\n• `{i}setwelcome <mesej/balas mesej>`\n    Tetapkan mesej selamat datang dalam chat semasa.\n\n• `{i}clearwelcome`\n    Padam selamat datang dalam chat semasa.\n\n• `{i}getwelcome`\n    Dapatkan mesej selamat datang dalam chat semasa.\n\n---- Selamat Tinggal ----\n• `{i}setgoodbye <mesej/balas mesej>`\n    Tetapkan mesej selamat tinggal dalam chat semasa.\n\n• `{i}cleargoodbye`\n    Padam selamat tinggal dalam chat semasa.\n\n• `{i}getgoodbye`\n    Dapatkan mesej selamat tinggal dalam chat semasa.\n\n• `{i}thankmembers on/off`\n    Hantar pelekat terima kasih apabila mencapai bilangan ahli 100*x dalam kumpulan anda.\n"
help_imagetools: " -\n\n• `{i}border <balas foto/pelekat>`\n    Untuk mencipta sempadan di sekeliling media tersebut..\n    Cth - `{i}border 12,22,23`\n       - `{i}border 12,22,23 ; lebar (dalam nombor)`\n\n• `{i}grey <balas mana-mana media>`\n    Untuk jadikannya hitam putih.\n\n• `{i}color <balas mana-mana media Hitam Putih>`\n    Untuk jadikannya Berwarna.\n\n• `{i}toon <balas mana-mana media>`\n    Untuk jadikannya toon.\n\n• `{i}danger <balas mana-mana media>`\n    Untuk jadikannya kelihatan Bahaya.\n\n• `{i}negative <balas mana-mana media>`\n    Untuk mencipta imej negatif.\n\n• `{i}blur <balas mana-mana media>`\n    Untuk jadikannya kabur.\n\n• `{i}quad <balas mana-mana media>`\n    cipta Vorteks.\n\n• `{i}mirror <balas mana-mana media>`\n    Untuk mencipta gambar cermin.\n\n• `{i}flip <balas mana-mana media>`\n    Untuk membalikkannya.\n\n• `{i}sketch <balas mana-mana media>`\n    Untuk melukis sketsanya.\n\n• `{i}blue <balas mana-mana media>`\n    sekadar keren.\n\n• `{i}csample <nama warna /kod warna>`\n   contoh : `{i}csample red`\n             `{i}csample #ffffff`\n\n• `{i}pixelator <balas imej>`\n    Cipta Imej Berpiksel..\n"
help_instagram: " -\n\n• `{i}instadl <URL Instagram>`\n  `Muat turun Media Instagram...`\n\n• `{i}instadata <username>`\n  `Dapatkan Data Instagram seseorang atau diri sendiri`\n\n• `{i}instaul <balas video/foto> <kapsyen>`\n  `Muat naik Media ke Instagram...`\n\n• `{i}igtv <balas video> <kapsyen>`\n  `Muat naik Media ke Igtv...`\n\n• `{i}reels <balas video> <kapsyen>`\n  `Muat naik Media ke Instagram reels...`\n\n• Guna Inline dengan Pembantu anda dengan pertanyaan `instatm`\n   Untuk mendapatkan siaran halaman utama...\n\n• Isi `INSTA_USERNAME` dan `INSTA_PASSWORD`\n  sebelum menggunakannya..\n"
help_locks: " -\n\n• `{i}lock <msgs/media/sticker/gif/games/inline/polls/invites/pin/changeinfo>`\n    Kunci Tetapan yang Digunakan dalam Kumpulan yang Digunakan.\n\n• `{i}unlock <msgs/media/sticker/gif/games/inline/polls/invites/pin/changeinfo>`\n    BUKA KUNCI Tetapan yang Digunakan dalam Kumpulan yang Digunakan.\n"
help_logo: " -\n\n• `{i}logo <teks>`\n   Jana logo bagi Teks yang diberikan\n   Atau Balas Kepada imej, untuk menulis teks anda di atasnya.\n   Atau Balas Kepada Fail Fon, Untuk menulis dengan fon tersebut.\n\n"
help_mediatools: " -\n\n• `{i}mediainfo <balas media>`\n   Untuk mendapatkan maklumat mengenainya.\n\n• `{i}rotate <darjah/sudut> <balas media>`\n   Putar mana-mana video/foto/media..\n   Nota : untuk video ia mestilah sudut 90-an\n"
help_misc: " -\n\n• `{i}eod`\n    `Dapatkan Peristiwa Hari Ini`\n\n• `{i}pntrst <pautan/id>`\n    Muat turun dan hantar pin pinterest\n\n• `{i}gadget <pertanyaan carian>`\n    Carian Gadget dari Telegram.\n\n• `{i}randomuser`\n   Jana butiran tentang pengguna rawak.\n\n• `{i}ascii <balas imej>`\n    Tukar imej yang dibalas kepada html.\n"
help_mute: " -\n\n• `{i}mute <balas mesej/ id pengguna>`\n    Senyapkan pengguna dalam chat semasa.\n\n• `{i}unmute <balas mesej/ id pengguna>`\n    Nyahsenyapkan pengguna dalam chat semasa.\n\n• `{i}dmute <balas mesej/ id pengguna>`\n    Senyapkan pengguna dalam chat semasa dengan memadam mesej.\n\n• `{i}undmute <balas mesej/ id pengguna>`\n    Nyahsenyapkan pengguna dmuted dalam chat semasa.\n\n• `{i}tmute <masa> <balas mesej/ id pengguna>`\n    s- saat\n    m- minit\n    h- jam\n    d- hari\n    Senyapkan pengguna dalam chat semasa dengan masa.\n"
help_notes: " -\n\n• `{i}addnote <perkataan><balas mesej>`\n    tambah nota dalam chat yang digunakan dengan mesej yang dibalas dan perkataan yang dipilih.\n\n• `{i}remnote <perkataan>`\n    Buang nota daripada chat yang digunakan.\n\n• `{i}listnote`\n    senaraikan semua nota.\n\n• Penggunaan :\n   tetapkan nota dalam kumpulan supaya semua boleh menggunakannya.\n   taip `#(Kata Kunci nota)` untuk mendapatkannya\n"
help_other: " -\n\n• `{i}send <username/id> <balas/taip>`\n    hantar mesej kepada Pengguna/Chat.\n\n• `{i}fwdreply <balas mesej>`\n    Balas mesej seseorang dengan memajukannya secara persendirian.\n\n• `{i}save <balas mesej>`\n    Simpan mesej yang dibalas ke kotak mesej tersimpan anda.\n\n• `{i}fsave <balas mesej>`\n    Majukan mesej yang dibalas ke mesej tersimpan anda.\n"
help_pmpermit: " -\n\n• `{i}a` atau `{i}approve`\n    Luluskan seseorang untuk PM.\n\n• `{i}da` atau `{i}disapprove`\n    Batalkan kelulusan seseorang untuk PM.\n\n• `{i}block`\n    Sekat seseorang.\n\n• `{i}unblock` | `{i}unblock all`\n    Buka sekatan seseorang.\n\n• `{i}nologpm`\n    Hentikan log mesej daripada pengguna.\n\n• `{i}logpm`\n    Mula log mesej daripada pengguna.\n\n• `{i}startarchive`\n    Arkib PM baru.\n\n• `{i}stoparchive`\n    Jangan arkib PM baru.\n\n• `{i}cleararchive`\n    Nyah-arkib semua chat.\n\n• `{i}listapproved`\n   Senaraikan semua PM yang diluluskan.\n"
help_polls: " -\n\n• `{i}poll <soalan> ; <pilihan> ; <pilihan>`\n    Dapatkan Undian Tanpa Nama dengan Pilihan Yang Diberikan\n\n• `{i}poll <soalan> ; <pilihan> ; <pilihan> | <jenis>`\n    Dapatkan undian yang ditetapkan dengan jenis yang dikehendaki!\n    jenis hendaklah salah satu daripada `public`, `multiple` atau `quiz`\n\n• `{i}poll <soalan> ; <pilihan> ; <pilihan> | quiz_<nombor jawapan>`\n    Dapatkan undian kuiz di mana nombor jawapan adalah nombor pilihan yang betul\n\n"
help_profanityfilter: " -\n\n•`{i}addprofanity`\n   Jika seseorang menghantar perkataan kesat dalam chat, maka bot akan memadam mesej tersebut.\n\n•`{i}remprofanity`\n   Buang chat daripada senarai Kata Kesat.\n\n"
help_profile: " -\n\n• `{i}setname <nama pertama // nama akhir>`\n    Tukar nama profil anda.\n\n• `{i}setbio <bio>`\n    Tukar bio profil anda.\n\n• `{i}setpic <balas gambar>`\n    Tukar gambar profil anda.\n\n• `{i}delpfp <n>(pilihan)`\n    Padam satu gambar profil, jika tiada nilai diberikan, atau padam n bilangan gambar.\n\n• `{i}poto <username>`\n    Muat naik foto Chat/Pengguna jika Tersedia.\n"
help_qrcode: " -\n\n• `{i}qrcode <teks/balas teks>`\n   `Buat qrcode daripada teks`\n\n• `{i}addqr <balas imej> <teks>`\n   `Buat qr daripada teks dan tambahkan ke imej.`\n\n• `{i}qrdecode <balas ke qrcode>`\n   `Ia menyahkod qrcode.`\n"
help_resize: " -\n\n•`{i}size <balas media>`\n   Untuk mendapatkan saiznya.\n\n•`{i}resize <nombor> <nombor>`\n   Untuk mengubah saiz imej pada paksi x, y.\n   cth. `{i}resize 690 960`\n"
help_schedulemsg: " -\n\n•`{i}schedule <teks/balas mesej> <masa>`\n    Dalam masa anda boleh gunakan saat sebagai nombor, atau seperti 1h atau 1m\n    cth. `{i}schedule Hello 100` Ia menghantar mesej selepas 100 saat.\n    cth. `{i}schedule Hello 1h` Ia menghantar mesej selepas sejam.\n"
help_search: " -\n\n• `{i}saavn <pertanyaan carian>`\n    Muat turun lagu dari Saavn.\n\n• `{i}google <pertanyaan>`\n    Untuk membuat carian google.\n\n• `{i}github <username>`\n    Dapatkan maklumat penuh profil github pengguna.\n\n• `{i}img <pertanyaan>`\n  `{i}img <pertanyaan> ; <bilangan keputusan>`\n    Untuk membuat carian Imej.\n\n• `{i}reverse`\n    Balas Imej atau pelekat untuk mencari sumbernya.\n"
help_snips: " -\n\n• `{i}addsnip <perkataan><balas mesej>`\n    tambah perkataan yang digunakan sebagai snip berkaitan dengan mesej yang dibalas.\n\n• `{i}remsnip <perkataan>`\n    Buang perkataan snip..\n\n• `{i}listsnip`\n    senaraikan semua snip.\n\n• Penggunaan :\n    taip `$(perkataan snip anda)` untuk mendapatkan balasan yang ditetapkan.\n"
help_specialtools: " -\n\n• `{i}wspr <username>`\n    Hantar mesej rahsia..\n\n• `{i}q <warna-pilihan>`\n• `{i}q @username`\n• `{i}q r <warna-pilihan>`\n• `{i}q count` : `pelbagai petikan`\n    Buat petikan..\n\n• `{i}sticker <pertanyaan>`\n    Cari Pelekat Mengikut Kehendak Anda..\n\n• `{i}getaudio <balas audio>`\n    Muat turun Audio untuk dimasukkan ke dalam Video/Gif yang Dikehendaki.\n\n• `{i}addaudio <balas Video/gif>`\n    Ia akan meletakkan audio di atas ke dalam video/gif yang dibalas.\n\n• `{i}dob <tarikh lahir>`\n    Masukkan dalam Format dd/mm/yy sahaja(cth .dob 01/01/1999).\n\n• `{i}wall <pertanyaan>`\n    Cari Kertas Dinding Hd Mengikut Kehendak Anda..\n"
help_stickertools: " -\n\n• `{i}destroy <balas pelekat beranimasi>`\n    Untuk memusnahkan pelekat.\n\n• `{i}tiny <balas media>`\n    Untuk mencipta pelekat Kecil.\n\n• `{i}kang <balas imej/pelekat>`\n    Kang pelekat (tambah ke pack anda).\n\n• `{i}packkang <nama pack>`\n    Kang set pelekat Lengkap (dengan nama tersuai).\n\n• `{i}round <balas mana-mana media>`\n    Untuk mengekstrak pelekat bulat.\n"
help_sudo: " -\n\n• `{i}addsudo`\n    Tambah Pengguna Sudo dengan membalas pengguna atau menggunakan userid yang dipisahkan <ruang>\n\n• `{i}delsudo`\n    Buang Pengguna Sudo dengan membalas pengguna atau menggunakan userid yang dipisahkan <ruang>\n\n• `{i}listsudo`\n    Senaraikan semua pengguna sudo.\n"
help_tag: " -\n\n• `{i}tagall`\n    Tag 100 Ahli Teratas chat.\n\n• `{i}tagadmins`\n    Tag Admin chat tersebut.\n\n• `{i}tagowner`\n    Tag Pemilik chat tersebut\n\n• `{i}tagbots`\n    Tag Bot chat tersebut.\n\n• `{i}tagrec`\n    Tag Ahli yang baru Aktif.\n\n• `{i}tagon`\n    Tag Ahli yang dalam talian(berfungsi hanya jika privasi dimatikan).\n\n• `{i}tagoff`\n    Tag Ahli yang luar talian(berfungsi hanya jika privasi dimatikan).\n"
help_tools: " -\n\n• `{i}circle`\n    Balas kepada lagu audio atau gif untuk mendapatkan nota video.\n\n• `{i}ls`\n    Dapatkan semua Fail di dalam sebuah Direktori.\n\n• `{i}bots`\n    Tunjukkan bilangan bot dalam chat semasa dengan pautan kekalnya.\n\n• `{i}hl <pautan> <teks-pilihan>`\n    Benam pautan dengan ruang sebagai mesej.\n\n• `{i}id`\n    Balas Pelekat untuk Mendapatkan Id nya\n    Balas Pengguna untuk Mendapatkan Id nya\n    Tanpa Membalas Anda Akan Mendapat Id Chat\n\n• `{i}sg <balas pengguna><username/id>`\n    Dapatkan Sejarah Nama pengguna yang dibalas.\n\n• `{i}tr <kod bahasa destinasi> <(balas) mesej>`\n    Dapatkan mesej yang diterjemahkan.\n\n• `{i}webshot <url>`\n    Dapatkan tangkapan skrin halaman web.\n\n• `{i}shorturl <url> <id-pilihan>`\n    pendekkan mana-mana url...\n"
help_unsplash: " -\n\n• {i}unsplash <pertanyaan carian> ; <bilangan gambar>\n    Carian Imej Unsplash.\n"
help_usage: "\n\n• `{i}usage`\n    Dapatkan keseluruhan penggunaan.\n\n• `{i}usage heroku`\n   Dapatkan statistik heroku.\n\n• `{i}usage db`\n   Dapatkan penggunaan storan database.\n"
help_utilities: " -\n\n• `{i}kickme` : Keluar daripada kumpulan.\n\n• `{i}date` : Tunjukkan Kalendar.\n\n• `{i}listreserved`\n    Senaraikan semua username (saluran/kumpulan) yang anda miliki.\n\n• `{i}stats` : Lihat statistik profil anda.\n\n• `{i}paste` - `Sertakan teks panjang / Balas ke fail teks.`\n\n• `{i}info <username/userid/chatid>`\n    Balas mesej seseorang.\n\n• `{i}invite <username/userid>`\n    Tambah pengguna ke chat.\n\n• `{i}rmbg <balas gambar>`\n    Buang latar belakang daripada gambar tersebut.\n\n• `{i}telegraph <balas media/teks>`\n    Muat naik media/teks ke telegraph.\n\n• `{i}json <balas mesej>`\n    Dapatkan pengekodan json bagi mesej.\n\n• `{i}suggest <balas mesej> atau <tajuk undian>`\n    Cipta undian Ya/Tidak untuk cadangan yang dibalas.\n\n• `{i}ipinfo <alamatIP>` : Dapatkan maklumat tentang alamat IP tersebut.\n\n• `{i}cpy <balas mesej>`\n   Salin mesej yang dibalas, dengan pemformatan. Luput dalam 24jam.\n• `{i}pst`\n   Tampal mesej yang disalin, dengan pemformatan.\n\n• `{i}thumb <balas fail>` : Muat turun thumbnail fail yang dibalas.\n\n• `{i}getmsg <pautan mesej>`\n  Dapatkan mesej dari chat dengan sekatan majukan/salin.\n"
help_variables: " -\n\n• `{i}get var <nama pembolehubah>`\n   Dapatkan nilai bagi nama pembolehubah yang diberikan.\n\n• `{i}get type <nama pembolehubah>`\n   Dapatkan jenis pembolehubah.\n\n• `{i}get db <kunci>`\n   Dapatkan nilai db bagi kunci yang diberikan.\n\n• `{i}get keys`\n   Dapatkan semua kunci redis.\n"
help_vctools: " -\n\n• `{i}startvc`\n    Mulakan Panggilan Kumpulan dalam kumpulan.\n\n• `{i}stopvc`\n    Hentikan Panggilan Kumpulan dalam kumpulan.\n\n• `{i}vctitle <tajuk>`\n    Tukar tajuk Panggilan Kumpulan.\n\n• `{i}vcinvite`\n    Jemput semua ahli kumpulan dalam Panggilan Kumpulan.\n    (Anda mestilah telah menyertai)\n"
help_videotools: " -\n\n•`{i}sample <tempoh dalam saat>`\n   Cipta sampel Pendek video..\n\n• `{i}vshots <bilangan tangkapan>`\n   Cipta tangkapan skrin video..\n\n• `{i}vtrim <masa mula> - <masa tamat> dalam saat`\n    Potong video yang panjang..\n"
help_warn: "\n\n•`{i}warn <balas pengguna> <sebab>`\n    Beri Amaran.\n\n•`{i}resetwarn <balas pengguna>`\n    Untuk menetapkan semula Semua Amaran.\n\n•`{i}warns <balas pengguna>`\n   Untuk Mendapatkan Senarai Amaran pengguna.\n\n•`{i}setwarn <bilangan amaran> | <ban/mute/kick>`\n   Tetapkan Nombor dalam bilangan amaran untuk amaran\n   Selepas meletakkan tanda ' | ' masukkan tindakan seperti ban/mute/kick\n   Lalainya 3 kick\n   Contoh : `setwarn 5 | mute`\n\n"
help_webupload: " -\n\n• `{i}webupload`\n    Muat naik fail ke pelayan lain.\n"
help_words: " -\n\n• `{i}meaning <perkataan>`\n    Dapatkan maksud perkataan.\n\n• `{i}synonym <perkataan>`\n    Dapatkan semua sinonim.\n\n• `{i}antonym <perkataan>`\n    Dapatkan semua antonim.\n\n• `{i}ud <perkataan>`\n    Dapatkan definisi perkataan dari urbandictionary.\n"
help_ziptools: "\n\n• `{i}zip <balas fail>`\n    zip fail yang dibalas\n    Untuk menetapkan kata laluan pada zip: `{i}zip <kata laluan>` balas kepada fail\n\n• `{i}unzip <balas fail zip>`\n    buka zip fail yang dibalas.\n\n• `{i}azip <balas fail>`\n   tambah fail ke kumpulan untuk muat naik zip berkumpulan\n\n• `{i}dozip`\n   muat naik zip berkumpulan bagi fail yang anda tambahkan dari `{i}azip`\n   Untuk Menetapkan Kata Laluan: `{i}dozip <kata laluan>`\n\n"
